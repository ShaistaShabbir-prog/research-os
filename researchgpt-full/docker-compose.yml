services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: researchgpt
      POSTGRES_PASSWORD: researchgpt
      POSTGRES_DB: researchgpt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: ./apps/api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      - db

  web:
    build: ./apps/web
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  pgdata:
