services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: researchos
      POSTGRES_PASSWORD: researchos
      POSTGRES_DB: researchos
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researchos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: researchos
      MINIO_ROOT_PASSWORD: researchos-password
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio_data:/data"]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/researchos-password
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4j_data:/data"]

  api:
    build: ./apps/api
    env_file: .env
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes: ["./apps/api:/app"]

  web:
    build: ./apps/web
    env_file: .env
    ports: ["3000:3000"]
    depends_on: [api]
    volumes: ["./apps/web:/app", "/app/node_modules"]

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
  neo4j_data:
