services:
  - type: web
    name: researchos-api
    runtime: python
    rootDir: researchos_production/apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:///./researchos.db
      - key: LLM_PROVIDER
        value: offline
      - key: CORS_ORIGINS
        value: https://research-os-web.vercel.app,https://research-os.vercel.app,https://*.vercel.app
      - key: PYTHONPATH
        value: .
    plan: free
